{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "dorm.fullname" . }}-spark-connect
  labels:
    {{- include "dorm.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "dorm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: spark-connect
  endpoints:
    - port: http-ui
      path: /metrics/prometheus
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
