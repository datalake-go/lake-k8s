{{- if .Values.metrics.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dorm.fullname" . }}-spark-dashboard
  labels:
    {{- include "dorm.labels" . | nindent 4 }}
    # kube-prometheus-stack's Grafana sidecar watches for ConfigMaps
    # carrying this label and loads them as provisioned dashboards.
    grafana_dashboard: "1"
data:
  spark-connect.json: |-
    {
      "uid": "dorm-spark-connect",
      "title": "Spark Connect ({{ .Release.Name }})",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "tags": ["dorm", "spark", "lakehouse"],
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "instance",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(jvm_memory_heap_used, instance)",
            "includeAll": true,
            "multi": true,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "JVM heap used (bytes)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "jvm_memory_heap_used{instance=~\"$instance\"}",
              "legendFormat": "{{`{{instance}}`}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "JVM non-heap used (bytes)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "jvm_memory_non_heap_used{instance=~\"$instance\"}",
              "legendFormat": "{{`{{instance}}`}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "GC collection time (ms/sec)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "rate(jvm_gc_time_seconds{instance=~\"$instance\"}[1m]) * 1000",
              "legendFormat": "{{`{{instance}} {{gc}}`}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "JVM threads",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "jvm_threads_count{instance=~\"$instance\"}",
              "legendFormat": "{{`{{instance}}`}}"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Spark Connect sessions (active)",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "spark_connect_num_sessions{instance=~\"$instance\"}",
              "legendFormat": "{{`{{instance}}`}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Spark Connect executions (in flight)",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 16 },
          "targets": [
            {
              "expr": "spark_connect_num_executions{instance=~\"$instance\"}",
              "legendFormat": "{{`{{instance}}`}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Queries completed (count/min)",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 16 },
          "targets": [
            {
              "expr": "rate(spark_connect_execute_requests_total{instance=~\"$instance\"}[1m]) * 60",
              "legendFormat": "{{`{{instance}}`}}"
            }
          ]
        }
      ]
    }
{{- end }}
