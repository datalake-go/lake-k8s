# Production AWS overlay — real S3 + IRSA + external catalog.

serviceAccount:
  create: true
  # IRSA annotation — replace with the role that has s3:{Get,Put,Delete,List}Object
  # plus s3:ListBucket on the lakehouse prefix.
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/lakeorm-spark-connect

storage:
  type: s3
  seaweedfs:
    enabled: false
  s3:
    bucket: my-lakehouse-bucket
    region: us-east-1
    pathStyle: false

catalog:
  # Bring your own — Nessie on EKS, Polaris, Glue, etc.
  type: rest
  uri: https://my-catalog.internal:8181
  nessie:
    enabled: false

sparkConnect:
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "8"
      memory: "16Gi"
